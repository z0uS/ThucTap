<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Danh mục | Quản trị Khoa CNTT</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>

<body>
  <div class="admin-wrapper" id="admin-wrapper">
    <div id="sidebar-placeholder"></div>
    <main class="admin-main">
      <div id="topbar-placeholder"></div>
      <div class="admin-content">
        <div class="page-header">
          <div>
            <h1>🏷️ Quản lý Danh mục</h1>
            <div class="page-breadcrumb">Dashboard › Danh mục</div>
          </div>
          <button class="btn btn-primary" onclick="openAddCategory()">+ Thêm danh mục</button>
        </div>

        <!-- Stats -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem" id="cat-stats">
        </div>

        <div class="data-panel">
          <div class="data-panel-header">
            <div class="data-panel-title" id="cat-count"></div>
            <div class="data-panel-actions">
              <div class="data-panel-search">
                <span class="search-ico">🔍</span>
                <input type="text" placeholder="Tìm danh mục..." oninput="renderCategoriesTable(this.value)">
              </div>
            </div>
          </div>
          <div class="data-panel-body">
            <table>
              <thead>
                <tr>
                  <th>Tên danh mục</th>
                  <th>Slug</th>
                  <th>Số bài viết</th>
                  <th>Thao tác</th>
                </tr>
              </thead>
              <tbody id="cat-tbody"></tbody>
            </table>
          </div>
          <div class="data-panel-footer">
            <span id="cat-count-foot">Lưu ý: Xóa danh mục không xóa bài viết thuộc danh mục đó.</span>
          </div>
        </div>

        <!-- Category Preview -->
        <div class="data-panel" style="margin-top:1.5rem">
          <div class="data-panel-header">
            <div class="data-panel-title">🗂️ Phân bố bài viết theo danh mục</div>
          </div>
          <div style="padding:1.5rem">
            <div id="cat-distribution"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Category Modal -->
  <div class="modal-overlay" id="cat-modal">
    <div class="modal" style="max-width:480px">
      <div class="modal-header">
        <h2 class="modal-title" id="cat-modal-title">Thêm danh mục mới</h2>
        <button class="modal-close" onclick="closeModal('cat-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="cat-form" onsubmit="saveCategory(); return false;">
          <input type="hidden" id="cat-id">
          <div class="form-group">
            <label class="form-label">Tên danh mục <span style="color:var(--danger)">*</span></label>
            <input type="text" id="cat-name" class="form-control" placeholder="Ví dụ: Tin tức khoa" required>
          </div>
          <div class="form-group">
            <label class="form-label">Slug (URL)</label>
            <input type="text" id="cat-slug" class="form-control" placeholder="tin-tuc">
            <p style="font-size:0.78rem;color:var(--text-muted);margin-top:0.3rem">Để trống sẽ tự tạo từ tên danh mục
            </p>
          </div>
          <div class="form-group">
            <label class="form-label">Màu sắc</label>
            <div style="display:flex;align-items:center;gap:0.75rem">
              <input type="color" id="cat-color" class="form-control"
                style="width:60px;height:42px;padding:4px;cursor:pointer" value="#3b82f6">
              <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
                <div
                  style="width:28px;height:28px;border-radius:6px;background:#3b82f6;cursor:pointer;border:2px solid transparent"
                  onclick="document.getElementById('cat-color').value='#3b82f6'" title="Xanh"></div>
                <div
                  style="width:28px;height:28px;border-radius:6px;background:#10b981;cursor:pointer;border:2px solid transparent"
                  onclick="document.getElementById('cat-color').value='#10b981'" title="Xanh lá"></div>
                <div
                  style="width:28px;height:28px;border-radius:6px;background:#f59e0b;cursor:pointer;border:2px solid transparent"
                  onclick="document.getElementById('cat-color').value='#f59e0b'" title="Vàng"></div>
                <div
                  style="width:28px;height:28px;border-radius:6px;background:#8b5cf6;cursor:pointer;border:2px solid transparent"
                  onclick="document.getElementById('cat-color').value='#8b5cf6'" title="Tím"></div>
                <div
                  style="width:28px;height:28px;border-radius:6px;background:#ef4444;cursor:pointer;border:2px solid transparent"
                  onclick="document.getElementById('cat-color').value='#ef4444'" title="Đỏ"></div>
                <div
                  style="width:28px;height:28px;border-radius:6px;background:#0891b2;cursor:pointer;border:2px solid transparent"
                  onclick="document.getElementById('cat-color').value='#0891b2'" title="Cyan"></div>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('cat-modal')">Hủy</button>
        <button class="btn btn-primary" onclick="saveCategory()">💾 Lưu danh mục</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!requireAdmin()) return;
      injectAdminLayout('categories', 'Quản lý Danh mục');
      renderCategoriesTable();
      renderCatStats();
      renderCatDistribution();
    });

    async function renderCatStats() {
      const cats = await getAll(DB_KEYS.categories);
      const posts = await getAll(DB_KEYS.posts);
      const totalPosts = posts.length;
      const categorized = posts.filter(p => p.category || p.categoryId).length;
      document.getElementById('cat-stats').innerHTML = `
        <div class="stat-card">
          <div class="stat-card-icon amber">🏷️</div>
          <div class="stat-card-info">
            <span class="stat-card-value">${cats.length}</span>
            <div class="stat-card-label">Tổng danh mục</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon blue">📝</div>
          <div class="stat-card-info">
            <span class="stat-card-value">${totalPosts}</span>
            <div class="stat-card-label">Tổng bài viết</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon green">✅</div>
          <div class="stat-card-info">
            <span class="stat-card-value">${categorized}</span>
            <div class="stat-card-label">Bài viết đã phân loại</div>
          </div>
        </div>`;
    }

    async function renderCatDistribution() {
      const cats = await getAll(DB_KEYS.categories);
      const posts = await getAll(DB_KEYS.posts);
      const maxCount = Math.max(...cats.map(c => posts.filter(p => p.category === c.slug || p.categoryId === c.id).length), 1);
      document.getElementById('cat-distribution').innerHTML = cats.map(c => {
        const count = posts.filter(p => p.category === c.slug || p.categoryId === c.id).length;
        const pct = Math.round((count / maxCount) * 100);
        return `
          <div style="display:flex;align-items:center;gap:1rem;margin-bottom:0.85rem">
            <div style="width:160px;font-size:0.85rem;font-weight:500;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</div>
            <div style="flex:1;height:22px;background:#f1f5f9;border-radius:6px;overflow:hidden">
              <div style="width:${pct}%;height:100%;background:${c.color || '#3b82f6'};border-radius:6px;transition:width 0.5s;display:flex;align-items:center;padding-left:8px">
                ${count > 0 ? `<span style="font-size:0.72rem;color:white;font-weight:600">${count}</span>` : ''}
              </div>
            </div>
            <div style="width:50px;text-align:right;font-size:0.82rem;color:#64748b">${count} bài</div>
          </div>`;
      }).join('');
    }
  </script>
</body>

</html>
