<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tìm kiếm bài viết, thông báo và giảng viên tại website Khoa Công nghệ Thông tin.">
  <title>Tìm kiếm | Khoa Công nghệ Thông tin</title>
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <div id="header"></div>
  <div class="header-spacer"></div>

  <!-- Search Hero -->
  <section class="search-hero">
    <div class="container">
      <h2 style="color:white;margin-bottom:1.25rem;text-align:center">🔍 Tìm kiếm thông tin</h2>
      <div class="search-form" style="max-width:680px;margin:0 auto">
        <span class="search-icon" style="font-size:1.1rem">🔍</span>
        <input type="text" id="main-search" placeholder="Tìm bài viết, thông báo, giảng viên..." autocomplete="off"
          style="font-size:1rem;padding:1rem 1rem 1rem 3.5rem">
        <button class="search-submit" onclick="doSearch()">Tìm kiếm</button>
      </div>
      <p id="search-hint" style="color:rgba(255,255,255,0.65);text-align:center;margin-top:0.75rem;font-size:0.875rem">
        Nhập từ khóa để tìm kiếm trong toàn bộ nội dung website
      </p>
    </div>
  </section>

  <!-- Results -->
  <section class="section">
    <div class="container">
      <div id="results-header" style="display:none;margin-bottom:1.5rem">
        <h3 id="results-count" style="color:var(--text-dark)"></h3>
      </div>

      <!-- Filter by type -->
      <div id="type-filter" style="display:none;margin-bottom:1.5rem">
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all" onclick="filterResults('all')">Tất cả</button>
          <button class="filter-tab" data-filter="post" onclick="filterResults('post')">📰 Bài viết</button>
          <button class="filter-tab" data-filter="announcement" onclick="filterResults('announcement')">📢 Thông
            báo</button>
          <button class="filter-tab" data-filter="faculty" onclick="filterResults('faculty')">👩‍🏫 Giảng viên</button>
        </div>
      </div>

      <div id="results-container">
        <!-- Initial state -->
        <div id="initial-state" style="text-align:center;padding:5rem 2rem">
          <div style="font-size:4rem;margin-bottom:1rem;opacity:0.4">🔍</div>
          <h3 style="color:var(--text-muted);font-weight:400">Nhập từ khóa để bắt đầu tìm kiếm</h3>
          <p style="color:var(--text-light);margin-top:0.5rem">Bạn có thể tìm kiếm bài viết, thông báo, và giảng viên
          </p>
          <div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem">
            <span class="badge badge-secondary" style="cursor:pointer;padding:0.4rem 0.9rem"
              onclick="quickSearch('AI')">AI</span>
            <span class="badge badge-secondary" style="cursor:pointer;padding:0.4rem 0.9rem"
              onclick="quickSearch('Hackathon')">Hackathon</span>
            <span class="badge badge-secondary" style="cursor:pointer;padding:0.4rem 0.9rem"
              onclick="quickSearch('thực tập')">Thực tập</span>
            <span class="badge badge-secondary" style="cursor:pointer;padding:0.4rem 0.9rem"
              onclick="quickSearch('học phí')">Học phí</span>
            <span class="badge badge-secondary" style="cursor:pointer;padding:0.4rem 0.9rem"
              onclick="quickSearch('tốt nghiệp')">Tốt nghiệp</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer"></div>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    let allResults = [];
    let currentTypeFilter = 'all';
    const searchInput = document.getElementById('main-search');

    // Check URL param
    document.addEventListener('DOMContentLoaded', () => {
      const q = getParam('q');
      if (q) { searchInput.value = q; doSearch(); }

      searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
    });

    function quickSearch(term) {
      searchInput.value = term;
      doSearch();
    }

    function doSearch() {
      const q = searchInput.value.trim();
      if (!q) return;
      allResults = searchAll(q);
      currentTypeFilter = 'all';
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('.filter-tab[data-filter="all"]')?.classList.add('active');
      renderResults(q);
    }

    function filterResults(type) {
      currentTypeFilter = type;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.filter-tab[data-filter="${type}"]`)?.classList.add('active');
      renderResults(searchInput.value.trim());
    }

    const typeIcons = { post: '📰', announcement: '📢', faculty: '👩‍🏫' };
    const typeLabels = { post: 'Bài viết', announcement: 'Thông báo', faculty: 'Giảng viên' };
    const typeColors = { post: 'badge-secondary', announcement: 'badge-danger', faculty: 'badge-success' };

    function renderResults(q) {
      const container = document.getElementById('results-container');
      const header = document.getElementById('results-header');
      const typeFilter = document.getElementById('type-filter');
      document.getElementById('initial-state')?.remove();

      const filtered = currentTypeFilter === 'all' ? allResults : allResults.filter(r => r.type === currentTypeFilter);

      header.style.display = 'block';
      typeFilter.style.display = 'block';

      if (!filtered.length) {
        document.getElementById('results-count').innerHTML = `Không tìm thấy kết quả nào cho "<strong>${q}</strong>"`;
        container.innerHTML = `
          <div class="no-results">
            <div class="icon" style="font-size:3.5rem;opacity:0.3">😕</div>
            <h3 style="color:var(--text-muted);font-weight:500">Không có kết quả phù hợp</h3>
            <p style="color:var(--text-light)">Thử tìm kiếm với từ khóa khác hoặc kiểm tra chính tả</p>
          </div>`;
        return;
      }

      const total = allResults.length;
      const countByType = {};
      allResults.forEach(r => { countByType[r.type] = (countByType[r.type] || 0) + 1; });
      document.getElementById('results-count').innerHTML =
        `Tìm thấy <strong>${filtered.length}${currentTypeFilter !== 'all' ? `/${total}` : ''}</strong> kết quả cho "<strong>${q}</strong>"
        <span style="color:var(--text-muted);font-size:0.85rem;margin-left:0.5rem">(${Object.entries(countByType).map(([t, c]) => `${typeLabels[t]}: ${c}`).join(', ')})</span>`;

      container.innerHTML = filtered.map(r => {
        const item = r.item;
        let title = item.title || item.name || '';
        let excerpt = item.excerpt || (item.content ? item.content.substring(0, 160) + '...' : null) || item.specialization || '';
        let date = item.date ? `📅 ${formatDate(item.date)}` : '';
        let extra = '';
        if (r.type === 'faculty') {
          extra = `<span class="badge badge-primary">${item.degree}</span> <span class="badge badge-secondary">${item.position}</span>`;
          excerpt = item.specialization;
        }
        return `
          <div class="search-result-item" onclick="window.location.href='${r.url}'" style="animation: fadeIn 0.4s ease forwards">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap">
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;flex-wrap:wrap">
                  <span class="badge ${typeColors[r.type]}">${typeIcons[r.type]} ${r.typeLabel}</span>
                  ${extra}
                  ${date ? `<span style="font-size:0.8rem;color:var(--text-muted)">${date}</span>` : ''}
                </div>
                <h3 style="cursor:pointer;margin-bottom:0.5rem">${highlightText(title, q)}</h3>
                <p style="font-size:0.875rem;color:var(--text-muted);margin:0">${highlightText(excerpt.substring(0, 160) + '...', q)}</p>
              </div>
              ${r.type === 'faculty' && item.image ? `<img src="${item.image}" alt="${item.name}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0">` : ''}
            </div>
          </div>`;
      }).join('');
    }
  </script>
</body>

</html>
