<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Thông báo của Khoa Công nghệ Thông tin – thông báo học tập, thi cử, học phí và tốt nghiệp.">
  <title>Thông báo | Khoa Công nghệ Thông tin</title>
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <div id="header"></div>
  <div class="header-spacer"></div>

  <section class="page-hero">
    <div class="container">
      <div class="page-hero-content">
        <div class="breadcrumb">
          <a href="trangchu.html">Trang chủ</a><span class="sep">›</span>
          <span class="current">Thông báo</span>
        </div>
        <h1>Thông báo</h1>
        <p>Cập nhật các thông báo quan trọng dành cho sinh viên Khoa CNTT</p>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <!-- Filter + Search -->
      <div
        style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:2rem"
        class="reveal">
        <div class="filter-tabs" style="margin-bottom:0">
          <button class="filter-tab active" data-filter="all" id="tab-all">📋 Tất cả</button>
          <button class="filter-tab" data-filter="hoc-tap">📖 Học tập</button>
          <button class="filter-tab" data-filter="thi-lai">📝 Thi lại</button>
          <button class="filter-tab" data-filter="thuc-tap">🏢 Thực tập</button>
          <button class="filter-tab" data-filter="hoc-phi">💰 Học phí</button>
          <button class="filter-tab" data-filter="tot-nghiep">🎓 Tốt nghiệp</button>
        </div>
        <div class="search-form" style="max-width:260px;width:100%">
          <span class="search-icon">🔍</span>
          <input type="text" id="ann-search" placeholder="Tìm thông báo...">
        </div>
      </div>

      <!-- Important notice banner -->
      <div
        style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem"
        class="reveal">
        <span style="font-size:1.5rem">🔔</span>
        <div>
          <strong style="color:var(--danger)">Lưu ý quan trọng:</strong>
          <span style="color:var(--text-body);font-size:0.9rem"> Sinh viên vui lòng đọc kỹ và thực hiện đúng thời hạn
            các thông báo được đánh dấu <span style="color:var(--danger);font-weight:700">ưu tiên cao</span>.</span>
        </div>
      </div>

      <!-- Announcements List -->
      <div id="announcements-list" style="display:flex;flex-direction:column;gap:0.85rem"></div>
      <div class="pagination" id="ann-pagination"></div>
    </div>
  </section>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="ann-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="ann-modal-title">Thông báo</h2>
        <button class="modal-close" onclick="closeModal('ann-modal')">✕</button>
      </div>
      <div class="modal-body" id="ann-modal-body"></div>
    </div>
  </div>

  <div id="footer"></div>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    let annPage = 1;
    const ANN_PER_PAGE = 8;
    let annFilter = 'all';
    let annSearch = '';

    const typeIcons = { 'hoc-tap': '📖', 'thi-lai': '📝', 'thuc-tap': '🏢', 'hoc-phi': '💰', 'tot-nghiep': '🎓' };

    document.addEventListener('DOMContentLoaded', () => {
      renderAnnouncements();

      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          annFilter = tab.dataset.filter;
          annPage = 1;
          renderAnnouncements();
        });
      });

      document.getElementById('ann-search').addEventListener('input', e => {
        annSearch = e.target.value.trim().toLowerCase();
        annPage = 1;
        renderAnnouncements();
      });

      const id = getParam('id');
      if (id) openAnnouncement(parseInt(id));
    });

    function getFiltered() {
      let list = getAll(DB_KEYS.announcements);
      if (annFilter !== 'all') list = list.filter(a => a.type === annFilter);
      if (annSearch) list = list.filter(a =>
        a.title.toLowerCase().includes(annSearch) || (a.content && a.content.toLowerCase().includes(annSearch))
      );
      list.sort((a, b) => {
        if (a.priority === 'high' && b.priority !== 'high') return -1;
        if (b.priority === 'high' && a.priority !== 'high') return 1;
        return new Date(b.date) - new Date(a.date);
      });
      return list;
    }

    function renderAnnouncements() {
      const list = getFiltered();
      const total = list.length;
      const totalPages = Math.max(1, Math.ceil(total / ANN_PER_PAGE));
      const sliced = list.slice((annPage - 1) * ANN_PER_PAGE, annPage * ANN_PER_PAGE);
      const container = document.getElementById('announcements-list');

      if (!sliced.length) {
        container.innerHTML = `<div class="no-results"><div class="icon">📢</div><p>Không có thông báo nào</p></div>`;
      } else {
        container.innerHTML = sliced.map(a => `
          <div class="announcement-item ${a.priority}" style="cursor:pointer" onclick="openAnnouncement(${a.id})">
            <div class="announcement-icon ${a.priority}">${typeIcons[a.type] || '📢'}</div>
            <div class="announcement-content">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem">
                <div class="announcement-title">${annSearch ? highlightText(a.title, annSearch) : a.title}</div>
                ${a.priority === 'high' ? '<span class="badge badge-danger" style="flex-shrink:0">🔴 Ưu tiên cao</span>' : ''}
              </div>
              <p style="font-size:0.82rem;color:var(--text-muted);margin:0.4rem 0 0">${a.content?.substring(0, 120)}...</p>
              <div class="announcement-meta" style="margin-top:0.5rem">
                <span class="announcement-badge badge-${a.type}">${a.typeName}</span>
                <span>📅 ${formatDate(a.date)}</span>
              </div>
            </div>
            <div style="color:var(--text-muted);font-size:1rem;flex-shrink:0">›</div>
          </div>`).join('');
      }
      renderPagination(document.getElementById('ann-pagination'), annPage, totalPages, p => {
        annPage = p; renderAnnouncements(); window.scrollTo({ top: 300, behavior: 'smooth' });
      });
    }

    function openAnnouncement(id) {
      const a = getById(DB_KEYS.announcements, id);
      if (!a) return;
      document.getElementById('ann-modal-title').textContent = a.title;
      document.getElementById('ann-modal-body').innerHTML = `
        <div style="margin-bottom:1rem;display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap">
          <span class="announcement-badge badge-${a.type}">${typeIcons[a.type]} ${a.typeName}</span>
          ${a.priority === 'high' ? '<span class="badge badge-danger">🔴 Ưu tiên cao</span>' : ''}
          <span class="text-sm text-muted">📅 ${formatDateLong(a.date)}</span>
        </div>
        <hr style="border:none;border-top:1px solid var(--border);margin-bottom:1rem">
        <div style="line-height:1.8;color:var(--text-body)">${a.content || 'Nội dung đang cập nhật...'}</div>
        <div style="margin-top:1.5rem;padding:1rem;background:var(--bg);border-radius:var(--radius);font-size:0.85rem;color:var(--text-muted)">
          📌 Mọi thắc mắc vui lòng liên hệ Văn phòng Khoa: <strong>cit@university.edu.vn</strong> hoặc <strong>(028) 3895 1234</strong>
        </div>`;
      openModal('ann-modal');
    }
  </script>
</body>

</html>
