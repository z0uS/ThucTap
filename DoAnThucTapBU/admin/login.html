<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập Quản trị | Khoa CNTT</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>

<body>
  <div class="admin-login-page">
    <div class="login-bg-shape login-bg-shape-1"></div>
    <div class="login-bg-shape login-bg-shape-2"></div>
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">🖥️</div>
        <h2>Quản trị Khoa CNTT</h2>
        <p>Đăng nhập để quản lý nội dung website</p>
      </div>

      <div id="error-msg"
        style="display:none;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:0.85rem 1rem;color:#dc2626;font-size:0.875rem;margin-bottom:1rem;display:none">
        ❌ Tên đăng nhập hoặc mật khẩu không chính xác.
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="username">Tên đăng nhập</label>
          <div class="input-icon-wrap">
            <span class="input-ico">👤</span>
            <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập" value="admin"
              required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Mật khẩu</label>
          <div class="input-icon-wrap">
            <span class="input-ico" style="z-index:1">🔒</span>
            <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" value="admin123"
              required style="padding-right:3rem">
            <span class="toggle-password" onclick="togglePw()" id="pw-toggle">👁</span>
          </div>
        </div>
        <div
          style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;font-size:0.85rem">
          <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;color:var(--text-muted)">
            <input type="checkbox" id="remember"> Ghi nhớ đăng nhập
          </label>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.85rem"
          id="login-btn">
          🔐 Đăng nhập
        </button>
      </form>

      <div
        style="margin-top:1.5rem;padding:1rem;background:#f8fafc;border-radius:8px;font-size:0.8rem;color:#64748b;text-align:center">
        Demo: <strong>admin</strong> / <strong>admin123</strong>
      </div>

      <div class="login-footer-link">
        <a href="../trangchu.html">← Về trang chủ</a>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script>
    // Redirect if already logged in
    if (isAdminLoggedIn()) window.location.href = 'dashboard.html';

    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');

      btn.textContent = '⏳ Đang xử lý...';
      btn.disabled = true;
      errEl.style.display = 'none';

      setTimeout(() => {
        if (adminLogin(username, password)) {
          showToast('Đăng nhập thành công!', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 800);
        } else {
          errEl.style.display = 'block';
          btn.textContent = '🔐 Đăng nhập';
          btn.disabled = false;
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      }, 700);
    }

    function togglePw() {
      const input = document.getElementById('password');
      const icon = document.getElementById('pw-toggle');
      if (input.type === 'password') { input.type = 'text'; icon.textContent = '🙈'; }
      else { input.type = 'password'; icon.textContent = '👁'; }
    }
  </script>
</body>

</html>
