<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Giảng viên | Quản trị Khoa CNTT</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>

<body>
  <div class="admin-wrapper" id="admin-wrapper">
    <div id="sidebar-placeholder"></div>
    <main class="admin-main">
      <div id="topbar-placeholder"></div>
      <div class="admin-content">
        <div class="page-header">
          <div>
            <h1>👩‍🏫 Quản lý Giảng viên</h1>
            <div class="page-breadcrumb">Dashboard › Giảng viên</div>
          </div>
          <button class="btn btn-primary" onclick="openAddFaculty()">+ Thêm giảng viên</button>
        </div>

        <div class="data-panel">
          <div class="data-panel-header">
            <div class="data-panel-title" id="faculty-count"></div>
            <div class="data-panel-actions">
              <div class="data-panel-search">
                <span class="search-ico">🔍</span>
                <input type="text" placeholder="Tìm kiếm giảng viên..." oninput="renderFacultyTable(this.value)">
              </div>
              <select class="form-control" style="padding:0.45rem 0.75rem;font-size:0.85rem;width:auto"
                onchange="filterByPos(this.value)">
                <option value="">Tất cả chức vụ</option>
                <option>Trưởng khoa</option>
                <option>Phó trưởng khoa</option>
                <option>Giảng viên</option>
              </select>
            </div>
          </div>
          <div class="data-panel-body">
            <table>
              <thead>
                <tr>
                  <th style="width:60px">Ảnh</th>
                  <th>Họ tên</th>
                  <th>Học vị</th>
                  <th>Chức vụ</th>
                  <th>Lĩnh vực chuyên môn</th>
                  <th>Thao tác</th>
                </tr>
              </thead>
              <tbody id="faculty-tbody"></tbody>
            </table>
          </div>
          <div class="data-panel-footer">
            <span id="faculty-count-foot"></span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Faculty Modal -->
  <div class="modal-overlay" id="faculty-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="faculty-modal-title">Thêm giảng viên mới</h2>
        <button class="modal-close" onclick="closeModal('faculty-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="faculty-form" onsubmit="saveFaculty(); return false;">
          <input type="hidden" id="faculty-id">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Họ và tên <span style="color:var(--danger)">*</span></label>
              <input type="text" id="faculty-name" class="form-control" placeholder="PGS.TS. Nguyễn Văn A" required>
            </div>
            <div class="form-group">
              <label class="form-label">Học vị</label>
              <select id="faculty-degree" class="form-control">
                <option value="ThS">ThS – Thạc sĩ</option>
                <option value="TS">TS – Tiến sĩ</option>
                <option value="PGS.TS">PGS.TS – Phó Giáo sư Tiến sĩ</option>
                <option value="GS.TS">GS.TS – Giáo sư Tiến sĩ</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Chức vụ</label>
              <select id="faculty-position" class="form-control">
                <option>Giảng viên</option>
                <option>Trưởng khoa</option>
                <option>Phó trưởng khoa</option>
                <option>Trưởng bộ môn</option>
                <option>Phó trưởng bộ môn</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" id="faculty-email" class="form-control" placeholder="gv@university.edu.vn">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Lĩnh vực chuyên môn</label>
            <input type="text" id="faculty-specialization" class="form-control"
              placeholder="Trí tuệ Nhân tạo, Machine Learning, ...">
          </div>
          <div class="form-group">
            <label class="form-label">URL Ảnh đại diện</label>
            <input type="url" id="faculty-image" class="form-control" placeholder="https://...">
            <p style="font-size:0.78rem;color:var(--text-muted);margin-top:0.3rem">Để trống sẽ tự động tạo ảnh từ tên
            </p>
            <img id="faculty-img-preview" class="img-preview" alt="Preview"
              style="width:80px;height:80px;border-radius:50%;border:3px solid var(--border);display:none">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('faculty-modal')">Hủy</button>
        <button class="btn btn-primary" onclick="saveFaculty()">💾 Lưu thông tin</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!requireAdmin()) return;
      injectAdminLayout('faculty', 'Quản lý Giảng viên');
      renderFacultyTable();
    });

    async function filterByPos(pos) {
      let list = await getAll(DB_KEYS.faculty);
      if (pos) list = list.filter(f => f.position === pos);
      list.sort((a, b) => (a.order || 99) - (b.order || 99));
      document.getElementById('faculty-tbody').innerHTML = list.map(f => {
        let name = f.fullName || f.name || 'Unknown';
        let image = f.avatar || f.image || 'https://ui-avatars.com/api/?name=User';
        return `
        <tr>
          <td><img src="${image}" alt="${name}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid #e2e8f0"></td>
          <td><strong>${name}</strong></td>
          <td><span class="badge badge-primary">${f.degree || '–'}</span></td>
          <td>${f.position || '–'}</td>
          <td style="font-size:0.8rem;color:#64748b">${f.specialization || '–'}</td>
          <td><div class="action-btns">
            <button class="action-btn edit" onclick="openEditFaculty('${f.id}')">✏️</button>
            <button class="action-btn delete" onclick="confirmDeleteFaculty('${f.id}')">🗑️</button>
          </div></td>
        </tr>`}).join('');
      const countEl = document.getElementById('faculty-count');
      if (countEl) countEl.textContent = `Tổng: ${list.length} giảng viên`;
    }
  </script>
</body>

</html>
