<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tin tức và sự kiện của Khoa Công nghệ Thông tin – cập nhật hoạt động mới nhất.">
  <title>Tin tức & Sự kiện | Khoa Công nghệ Thông tin</title>
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <div id="header"></div>
  <div class="header-spacer"></div>

  <section class="page-hero">
    <div class="container">
      <div class="page-hero-content">
        <div class="breadcrumb">
          <a href="trangchu.html">Trang chủ</a><span class="sep">›</span>
          <span class="current">Tin tức & Sự kiện</span>
        </div>
        <h1>Tin tức & Sự kiện</h1>
        <p>Cập nhật hoạt động, thành tích và sự kiện nổi bật của Khoa CNTT</p>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <!-- Search + Filter -->
      <div
        style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:2rem"
        class="reveal">
        <div class="filter-tabs" style="margin-bottom:0" id="cat-tabs">
          <button class="filter-tab active" data-filter="all">Tất cả</button>
          <!-- Categories rendered by JS -->
        </div>
        <div class="search-form" style="max-width:280px;width:100%">
          <span class="search-icon">🔍</span>
          <input type="text" id="news-search" placeholder="Tìm kiếm bài viết..." autocomplete="off">
        </div>
      </div>

      <!-- Featured Post -->
      <div id="featured-post" style="margin-bottom:2.5rem" class="reveal"></div>

      <!-- News Grid -->
      <div class="grid grid-3" id="news-grid"></div>

      <!-- Pagination -->
      <div class="pagination" id="news-pagination"></div>
    </div>
  </section>

  <!-- Article Detail Modal -->
  <div class="modal-overlay" id="article-modal">
    <div class="modal" style="max-width:800px">
      <div class="modal-header">
        <h2 class="modal-title" id="article-title">Tiêu đề bài viết</h2>
        <button class="modal-close" onclick="closeModal('article-modal')">✕</button>
      </div>
      <div class="modal-body" id="article-body"></div>
    </div>
  </div>

  <div id="footer"></div>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    let currentPage = 1;
    const PER_PAGE = 6;
    let currentFilter = 'all';
    let currentSearch = '';

    document.addEventListener('DOMContentLoaded', async () => {
      await buildCatTabs();
      await renderNews();

      // Search
      const searchInput = document.getElementById('news-search');
      searchInput.addEventListener('input', async () => {
        currentSearch = searchInput.value.trim().toLowerCase();
        currentPage = 1;
        await renderNews();
      });

      // Check if direct link to article
      const id = getParam('id');
      if (id) openArticle(id);
    });

    async function buildCatTabs() {
      const tabsEl = document.getElementById('cat-tabs');
      const cats = await getAll(DB_KEYS.categories);
      cats.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'filter-tab';
        btn.dataset.filter = c.slug;
        btn.textContent = c.name;
        btn.onclick = async () => {
          document.querySelectorAll('#cat-tabs .filter-tab').forEach(t => t.classList.remove('active'));
          btn.classList.add('active');
          currentFilter = c.slug;
          currentPage = 1;
          await renderNews();
        };
        tabsEl.appendChild(btn);
      });
      tabsEl.querySelector('[data-filter="all"]').onclick = async () => {
        document.querySelectorAll('#cat-tabs .filter-tab').forEach(t => t.classList.remove('active'));
        tabsEl.querySelector('[data-filter="all"]').classList.add('active');
        currentFilter = 'all';
        currentPage = 1;
        await renderNews();
      };
    }

    async function getFilteredPosts() {
      let posts = await getAll(DB_KEYS.posts);
      if (currentFilter !== 'all') posts = posts.filter(p => p.category === currentFilter || p.categoryId == currentFilter);
      if (currentSearch) posts = posts.filter(p =>
        (p.title || '').toLowerCase().includes(currentSearch) ||
        (p.content && p.content.toLowerCase().includes(currentSearch))
      );
      return posts;
    }

    async function renderNews() {
      let posts = await getFilteredPosts();
      const total = posts.length;
      const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
      const sliced = posts.slice((currentPage - 1) * PER_PAGE, currentPage * PER_PAGE);

      // Featured post (page 1, no filter)
      const featuredEl = document.getElementById('featured-post');
      if (currentPage === 1 && currentFilter === 'all' && !currentSearch && posts.length) {
        const fp = posts[0];
        featuredEl.innerHTML = `
          <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:2rem;background:white;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow)">
            <div style="height:300px;overflow:hidden;cursor:pointer" onclick="openArticle('${fp.id}')">
              <img src="${fp.image || 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=800&q=80'}" alt="${fp.title}" style="width:100%;height:100%;object-fit:cover;transition:transform 0.4s" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            </div>
            <div style="padding:2rem;display:flex;flex-direction:column;justify-content:center">
              <div style="display:flex;gap:0.75rem;margin-bottom:1rem;align-items:center">
                <span class="badge badge-accent">⭐ Nổi bật</span>
                <span class="badge badge-secondary">${fp.categoryName || fp.categoryId || 'Tin tức'}</span>
              </div>
              <h2 style="color:var(--text-dark);margin-bottom:1rem;cursor:pointer" onclick="openArticle('${fp.id}')">${fp.title}</h2>
              <p style="color:var(--text-muted);margin-bottom:1rem">${fp.excerpt || (fp.content ? fp.content.substring(0, 160) : '') + '...'}</p>
              <div style="display:flex;align-items:center;gap:1rem;font-size:0.82rem;color:var(--text-light)">
                <span>✍ ${fp.author || 'Admin'}</span><span>📅 ${formatDate(fp.date)}</span><span>👁 ${fp.views || 0} lượt xem</span>
              </div>
              <button onclick="openArticle('${fp.id}')" class="btn btn-primary" style="margin-top:1.25rem;width:fit-content">Đọc bài viết →</button>
            </div>
          </div>`;
      } else featuredEl.innerHTML = '';

      const grid = document.getElementById('news-grid');
      if (!sliced.length) {
        grid.innerHTML = `<div class="no-results" style="grid-column:1/-1"><div class="icon">📰</div><p>Không tìm thấy bài viết nào</p></div>`;
      } else {
        grid.innerHTML = sliced.map(p => `
          <article class="card news-card reveal">
            <div class="card-img" style="cursor:pointer" onclick="openArticle('${p.id}')">
              <img src="${p.image || 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=600&q=80'}" alt="${p.title}" loading="lazy">
            </div>
            <div class="card-body">
              <div class="card-meta">
                <span class="badge badge-secondary">${p.categoryName || p.categoryId || 'Tin tức'}</span>
                <span class="text-sm text-muted">📅 ${formatDate(p.date)}</span>
              </div>
              <h3 class="card-title" style="cursor:pointer" onclick="openArticle('${p.id}')">${currentSearch ? highlightText(p.title, currentSearch) : p.title}</h3>
              <p class="card-excerpt">${p.excerpt || (p.content ? p.content.substring(0, 120) : '') + '...'}</p>
              <div style="display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:0.75rem">
                <span style="font-size:0.78rem;color:var(--text-muted)">✍ ${p.author || 'Admin'} • 👁 ${p.views || 0}</span>
                <button onclick="openArticle('${p.id}')" class="card-footer-link" style="background:none;font-size:0.875rem;color:var(--primary);font-weight:600">Đọc thêm →</button>
              </div>
            </div>
          </article>`).join('');
      }

      renderPagination(document.getElementById('news-pagination'), currentPage, totalPages, p => {
        currentPage = p; renderNews(); window.scrollTo({ top: 400, behavior: 'smooth' });
      });
    }

    async function openArticle(id) {
      const p = await getById(DB_KEYS.posts, id);
      if (!p) return;
      trackView(id);
      document.getElementById('article-title').textContent = p.title;
      document.getElementById('article-body').innerHTML = `
        <div style="margin-bottom:1.25rem">
          <div style="display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;margin-bottom:0.75rem">
            <span class="badge badge-secondary">${p.categoryName || p.categoryId || 'Tin tức'}</span>
            <span class="text-sm text-muted">📅 ${formatDateLong(p.date)}</span>
            <span class="text-sm text-muted">✍ ${p.author || 'Admin'}</span>
            <span class="text-sm text-muted">👁 ${p.views || 0} lượt xem</span>
          </div>
          ${p.image ? `<img src="${p.image}" alt="${p.title}" style="width:100%;height:300px;object-fit:cover;border-radius:var(--radius);margin-bottom:1.25rem">` : ''}
          <div style="line-height:1.8;color:var(--text-body)">${p.content || '<p>Nội dung đang được cập nhật...</p>'}</div>
        </div>`;
      openModal('article-modal');
    }
  </script>
</body>

</html>
